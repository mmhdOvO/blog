# 应用服务 WEB 访问端口
server.port=8084

# MySQL ????
spring.datasource.url=jdbc:mysql://localhost:3306/blog_db?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis ??
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.demo.entity
mybatis.configuration.map-underscore-to-camel-case=true

jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Redis ????????????? Redis ??????
# spring.redis.host=localhost
# spring.redis.port=6379
deepseek.api.url=https://api.deepseek.com/chat/completions
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}